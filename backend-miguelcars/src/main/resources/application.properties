# ============================================================
#  MIGUEL CARS — Configuración de aplicación
# ============================================================

# ── Base de datos PostgreSQL (Neon Cloud) ───────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-bitter-thunder-atvhwfxz-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&currentSchema=miguel_cars}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_Tn4ZGY6soULJ}

# ── HikariCP — Pool de conexiones optimizado ─────────────────
# Evita abrir/cerrar conexiones en cada petición HTTP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=miguel_cars

# OPTIMIZACIÓN: desactivar open-in-view evita que Hibernate
# mantenga la sesión abierta durante el render HTTP,
# previniendo consultas lazy innecesarias en la capa de vista.
spring.jpa.open-in-view=false

# ── Seguridad (desarrollo) ───────────────────────────────────
spring.security.user.name=admin
spring.security.user.password=admin

# ── Servidor ─────────────────────────────────────────────────
server.port=${PORT:8080}
